<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reserva tu hora — Attempo</title>
<meta name="description" content="Reserva tu cita online de forma rápida. Elige profesional, día y hora disponible. Confirmación inmediata y recordatorio automático. Todo a tu tiempo.">
<meta name="robots" content="index, follow">
<meta property="og:type" content="website">
<meta property="og:title" content="Reserva tu hora — Attempo">
<meta property="og:description" content="Agenda tu cita en minutos. Elige profesional, día y hora. Confirmación inmediata y recordatorio por WhatsApp.">
<meta property="og:image" content="https://www.attempo.cl/logo_attempo.png">
<meta property="og:locale" content="es_CL">
<meta property="og:site_name" content="Attempo">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Reserva tu hora — Attempo">
<meta name="twitter:image" content="https://www.attempo.cl/logo_attempo.png">
<link rel="icon" type="image/png" href="/logo_attempo.png">
<link rel="apple-touch-icon" href="/logo_attempo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --a:#6C5CE4;--a2:#8B7CF8;--a3:#4F3EE0;--adim:rgba(108,92,228,0.08);
  --bg:#F8F7FF;
  --t1:#16143A;--t2:#5E5880;--t3:#9C96B4;--t4:#C4C0D8;
  --green:#16A34A;
  --b1:rgba(108,92,228,0.08);--b2:rgba(108,92,228,0.18);
  --sh1:0 1px 4px rgba(108,92,228,0.07),0 4px 16px rgba(108,92,228,0.05);
  --r:8px;--rl:12px;--rx:16px;
  --mono:'Geist Mono',monospace;
}
html,body{height:100%;font-family:'Geist',sans-serif;background:var(--bg);color:var(--t1)}
body{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* NAV */
.nav{
  flex-shrink:0;
  background:linear-gradient(135deg,#1E1B3A 0%,#16143A 60%,#1A1642 100%);
  padding:11px 24px;height:56px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(108,92,228,0.25);z-index:10;
}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-mark{width:28px;height:28px;background:linear-gradient(135deg,#8B7CF8,#6C5CE4);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;font-weight:700;color:#fff;letter-spacing:-.01em;box-shadow:0 2px 10px rgba(108,92,228,0.5)}
.nav-biz{font-size:14px;font-weight:600;color:#fff;letter-spacing:-.03em}
.nav-badge{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:100px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.07);font-size:11px;color:rgba(255,255,255,0.65)}
.ldot{width:6px;height:6px;border-radius:50%;background:#16A34A;flex-shrink:0;animation:blink 2.5s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

/* LAYOUT */
.chat-wrap{flex:1;overflow:hidden;display:flex;flex-direction:column;max-width:720px;margin:0 auto;width:100%;padding:0 16px}
.messages{flex:1;overflow-y:auto;padding:20px 0 8px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:var(--b2);border-radius:4px}

/* MENSAJES */
.msg{display:flex;gap:10px;max-width:82%;animation:fadeUp .22s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.msg.ai{align-self:flex-start}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg-av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--a2),var(--a3));display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;font-weight:600;color:#fff;flex-shrink:0;box-shadow:0 2px 8px rgba(108,92,228,0.3);margin-top:2px}
.msg-bubble{padding:11px 14px;font-size:14px;line-height:1.65;word-break:break-word}
.msg.ai  .msg-bubble{background:#fff;border:1px solid var(--b1);color:var(--t1);border-radius:4px 14px 14px 14px;box-shadow:var(--sh1)}
.msg.user .msg-bubble{background:linear-gradient(135deg,var(--a),var(--a3));color:#fff;border-radius:14px 4px 14px 14px;box-shadow:0 2px 8px rgba(108,92,228,0.3)}

/* CHIPS generales */
.chips-wrap{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px;padding-left:42px;animation:fadeUp .25s ease}
.chip{
  padding:7px 14px;background:#fff;border:1.5px solid var(--b2);border-radius:100px;
  font-size:12px;font-weight:500;color:var(--a);cursor:pointer;transition:all .15s;
  white-space:nowrap;user-select:none;
}
.chip:hover{background:var(--adim);border-color:var(--a);transform:translateY(-1px)}
.chip:active{transform:translateY(0)}

/* SLOTS de hora */
.slots-wrap{margin-top:10px;padding-left:42px;animation:fadeUp .25s ease}
.slots-section{margin-bottom:12px}
.slots-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);margin-bottom:6px}
.slots-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;max-width:320px}
.slot-btn{
  padding:11px 6px;background:#fff;border:1.5px solid var(--b1);border-radius:var(--r);
  font-size:13px;font-family:var(--mono);font-weight:500;color:var(--t2);
  cursor:pointer;transition:all .15s;text-align:center;min-height:44px;
  touch-action:manipulation;-webkit-tap-highlight-color:transparent;
}
.slot-btn:hover{border-color:var(--a);color:var(--a);background:var(--adim);transform:translateY(-1px)}
.slot-btn:active{transform:translateY(0)}
@media(max-width:600px){.slots-grid{grid-template-columns:repeat(3,1fr);max-width:none}}
@media(max-width:380px){
  .slots-grid{grid-template-columns:repeat(2,1fr)}
  .confirm-card{max-width:100%}
  .chips-wrap{padding-left:0}
  .chip{font-size:11px;padding:6px 10px}
}

/* TYPING */
.typing .msg-bubble{padding:13px 16px}
.typing-dots{display:flex;gap:4px;align-items:center}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--t4);animation:bounce 1.2s ease-in-out infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}

/* CONFIRMACIÓN */
.confirm-card{background:#fff;border:1px solid rgba(22,163,74,0.25);border-radius:var(--rx);padding:18px 20px;margin-top:8px;box-shadow:0 2px 12px rgba(22,163,74,0.08);max-width:300px}
.confirm-icon{width:40px;height:40px;border-radius:50%;background:rgba(22,163,74,0.1);border:1.5px solid rgba(22,163,74,0.2);display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:10px;animation:pop .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.confirm-title{font-size:14px;font-weight:700;color:var(--t1);margin-bottom:9px;letter-spacing:-.02em}
.confirm-row{display:flex;gap:8px;font-size:12px;margin-bottom:4px;align-items:baseline}
.confirm-row b{color:var(--t3);font-weight:500;min-width:72px;flex-shrink:0}
.confirm-row span{color:var(--t1);font-weight:600}

/* INPUT */
.input-bar{flex-shrink:0;padding:10px 0 20px;padding-bottom:max(20px,env(safe-area-inset-bottom));display:flex;gap:10px}
.chat-input{flex:1;padding:11px 16px;border:1.5px solid var(--b1);border-radius:24px;font-size:16px;font-family:'Geist',sans-serif;color:var(--t1);background:#fff;outline:none;transition:border-color .12s;resize:none;line-height:1.5;max-height:120px;overflow-y:auto}
.chat-input:focus{border-color:var(--a)}
.chat-input::placeholder{color:var(--t4)}
.send-btn{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--a),var(--a3));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px rgba(108,92,228,0.3);transition:all .15s}
.send-btn:hover{transform:scale(1.06);box-shadow:0 4px 16px rgba(108,92,228,0.4)}
.send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.send-btn svg{color:#fff}

/* ESTADOS */
.loading-wrap{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--t3);font-size:13px}
.spin{width:28px;height:28px;border:2.5px solid var(--b2);border-top-color:var(--a);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-wrap{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;text-align:center;padding:32px}
.error-wrap h3{font-size:16px;color:var(--t1)}
.error-wrap p{font-size:13px;color:var(--t3)}

@media(max-width:600px){
  .nav{padding:10px 16px}
  .chat-wrap{padding:0 10px}
  .msg{max-width:92%}
  .msg-bubble{font-size:13px;padding:10px 12px}
  .chips-wrap{padding-left:0;gap:6px}
  .chip{font-size:11px;padding:6px 12px}
  .slots-wrap{padding-left:0}
}
</style>
</head>
<body>

<nav class="nav">
  <a class="nav-logo" href="#">
    <div class="nav-mark">tt</div>
    <span class="nav-biz" id="nav-negocio">Cargando...</span>
  </a>
  <span class="nav-badge"><span class="ldot"></span>Reserva en línea</span>
</nav>

<div class="chat-wrap">
  <div class="messages" id="messages">
    <div class="loading-wrap" id="loading">
      <div class="spin"></div>
      <span>Conectando...</span>
    </div>
  </div>
  <div class="input-bar" id="input-bar" style="display:none">
    <textarea class="chat-input" id="chat-input" placeholder="Escribe tu respuesta..." rows="1"></textarea>
    <button class="send-btn" id="send-btn" onclick="enviar()" title="Enviar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<script>
const SURL = 'https://xztqawulvrtjvtfixofy.supabase.co';
const SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh6dHFhd3VsdnJ0anZ0Zml4b2Z5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MTQ4OTgsImV4cCI6MjA5MjI5MDg5OH0.nMxUfN_pR3FImpO6l9MsYo9Z5B-0KU1ZHfbPor2qgu8';
const SH   = { apikey: SKEY, Authorization: `Bearer ${SKEY}` };

let clienteId     = null;
let negocioNombre = '';
let historial     = [];
let enviando      = false;

/* ─ CHIPS CONTEXTUALES ─ */
const CHIPS_INICIAL = ['Quiero agendar una cita', 'Horarios de atención', 'Ver servicios', 'Otra consulta'];

function getChips(texto) {
  const t = texto.toLowerCase();
  if (t.includes('nombre') || t.includes('llamas') || t.includes('cómo te llamo'))
    return [];
  if (t.includes('motivo') || t.includes('tipo de consulta') || t.includes('en qué te puedo') || t.includes('en qué puedo ayudarte'))
    return ['Consulta general', 'Control', 'Primera consulta', 'Urgencia', 'Otro motivo'];
  if (t.includes('qué día') || t.includes('fecha') || t.includes('cuándo') || t.includes('qué fecha'))
    return ['Hoy', 'Mañana', 'Esta semana', 'La próxima semana'];
  if (t.includes('qué hora') || t.includes('hora prefer') || t.includes('horario prefer'))
    return [];
  if (t.includes('todo correcto') || t.includes('¿confirm') || t.includes('procedemos') || t.includes('¿agend'))
    return ['Sí, confirmar', 'No, quiero cambiar algo'];
  if (t.includes('email') || t.includes('correo'))
    return [];
  return [];
}

/* ─ INIT ─ */
(async function init() {
  const params = new URLSearchParams(window.location.search);
  const cid    = params.get('cid');
  const path   = window.location.pathname;
  const slug   = path.startsWith('/reservar/')
    ? path.split('/reservar/')[1]
    : (path.replace(/^\//, '') || null);

  try {
    let rows;
    if (cid) {
      const r = await fetch(`${SURL}/rest/v1/clientes_sistema?id=eq.${cid}&select=id,nombre_negocio&limit=1`, { headers: SH });
      rows = await r.json();
    } else if (slug) {
      const r = await fetch(`${SURL}/rest/v1/clientes_sistema?booking_slug=eq.${encodeURIComponent(slug)}&select=id,nombre_negocio&limit=1`, { headers: SH });
      rows = await r.json();
    }

    if (!Array.isArray(rows) || !rows.length) {
      mostrarError('Negocio no encontrado', 'Verifica que el enlace sea correcto.');
      return;
    }

    clienteId     = rows[0].id;
    negocioNombre = rows[0].nombre_negocio || 'la clínica';
    document.getElementById('nav-negocio').textContent = negocioNombre;
    document.title = `Reserva en ${negocioNombre} — Attempo`;

    mostrarBienvenida();
  } catch(e) {
    mostrarError('Error de conexión', 'No se pudo cargar la información. Recarga la página.');
  }
})();

/* ─ BIENVENIDA ESTÁTICA ─ */
function mostrarBienvenida() {
  document.getElementById('loading').remove();
  document.getElementById('input-bar').style.display = 'flex';

  const saludo = `¡Hola! Bienvenido/a a ${negocioNombre}. Soy Attia, tu asistente virtual. ¿En qué puedo ayudarte hoy?`;
  agregarMensaje('ai', saludo, null, CHIPS_INICIAL);
}

/* ─ ENVIAR ─ */
async function enviar(textoDirecto) {
  if (enviando) return;
  const input = document.getElementById('chat-input');
  const texto = textoDirecto || input.value.trim();
  if (!texto) return;

  input.value = '';
  input.style.height = '';
  quitarChips();
  agregarMensaje('user', texto);
  historial.push({ role: 'user', content: texto });

  enviando = true;
  document.getElementById('send-btn').disabled = true;
  mostrarTyping();

  const respuesta = await llamarIA();
  quitarTyping();
  enviando = false;
  document.getElementById('send-btn').disabled = false;

  if (respuesta) {
    historial.push({ role: 'assistant', content: respuesta.mensaje });
    if (respuesta.slots_disponibles?.length) {
      agregarMensaje('ai', respuesta.mensaje, null, null, respuesta.slots_disponibles);
    } else {
      const chips = respuesta.cita_creada ? [] : getChips(respuesta.mensaje);
      agregarMensaje('ai', respuesta.mensaje, respuesta.cita_creada, chips);
    }
  }
}

/* ─ CHIP CLICK ─ */
function clickChip(texto) {
  enviar(texto);
}

/* ─ LLAMAR API ─ */
async function llamarIA() {
  try {
    const r = await fetch('/api/ai-chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: historial, cliente_id: clienteId, negocio_nombre: negocioNombre })
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Error del servidor');
    return data;
  } catch(e) {
    agregarMensaje('ai', 'Ups, hubo un problema de conexión. ¿Puedes intentar de nuevo?');
    return null;
  }
}

/* ─ UI ─ */
function agregarMensaje(rol, texto, cita, chips, slots) {
  const wrap = document.getElementById('messages');

  const div = document.createElement('div');
  div.className = `msg ${rol}`;

  if (rol === 'ai') {
    div.innerHTML = `
      <div class="msg-av">tt</div>
      <div>
        <div class="msg-bubble">${esc(texto)}</div>
        ${cita ? tarjetaConfirmacion(cita) : ''}
      </div>`;
  } else {
    div.innerHTML = `<div class="msg-bubble">${esc(texto)}</div>`;
  }

  wrap.appendChild(div);

  if (slots && slots.length) {
    wrap.appendChild(renderSlots(slots));
  } else if (chips && chips.length) {
    const chipsDiv = document.createElement('div');
    chipsDiv.className = 'chips-wrap';
    chipsDiv.id = 'chips-activos';
    chips.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'chip';
      btn.textContent = c;
      btn.addEventListener('click', () => clickChip(c));
      chipsDiv.appendChild(btn);
    });
    wrap.appendChild(chipsDiv);
  }

  wrap.scrollTop = wrap.scrollHeight;
}

function renderSlots(slots) {
  const manana = slots.filter(s => parseInt(s) < 13);
  const tarde  = slots.filter(s => parseInt(s) >= 13);

  const wrap = document.createElement('div');
  wrap.className = 'slots-wrap';
  wrap.id = 'chips-activos';

  function seccion(label, lista) {
    if (!lista.length) return;
    const sec = document.createElement('div');
    sec.className = 'slots-section';
    const lbl = document.createElement('div');
    lbl.className = 'slots-label';
    lbl.textContent = label;
    sec.appendChild(lbl);
    const grid = document.createElement('div');
    grid.className = 'slots-grid';
    lista.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'slot-btn';
      btn.textContent = s;
      btn.addEventListener('click', () => clickChip(s));
      grid.appendChild(btn);
    });
    sec.appendChild(grid);
    wrap.appendChild(sec);
  }

  seccion('Mañana', manana);
  seccion('Tarde', tarde);
  return wrap;
}

function quitarChips() {
  document.getElementById('chips-activos')?.remove();
}

function tarjetaConfirmacion(cita) {
  const fecha = cita.fecha
    ? new Date(cita.fecha + 'T12:00:00').toLocaleDateString('es-CL', { weekday:'long', day:'numeric', month:'long' })
    : '—';
  const hora = cita.hora ? cita.hora.slice(0, 5) : '—';
  return `
    <div class="confirm-card">
      <div class="confirm-icon">✓</div>
      <div class="confirm-title">Cita confirmada</div>
      <div class="confirm-row"><b>Paciente</b><span>${esc(cita.nombre_paciente || '—')}</span></div>
      <div class="confirm-row"><b>Fecha</b><span>${fecha}</span></div>
      <div class="confirm-row"><b>Hora</b><span>${hora}</span></div>
      ${cita.servicio ? `<div class="confirm-row"><b>Motivo</b><span>${esc(cita.servicio)}</span></div>` : ''}
    </div>`;
}

function mostrarTyping() {
  const wrap = document.getElementById('messages');
  const div  = document.createElement('div');
  div.className = 'msg ai typing';
  div.id = 'typing-indicator';
  div.innerHTML = `<div class="msg-av">tt</div><div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
}

function quitarTyping() {
  document.getElementById('typing-indicator')?.remove();
}

function mostrarError(titulo, desc) {
  document.getElementById('loading')?.remove();
  document.getElementById('messages').innerHTML = `
    <div class="error-wrap"><h3>${titulo}</h3><p>${desc}</p></div>`;
}

function esc(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

/* ─ TECLADO ─ */
document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviar(); }
});
document.getElementById('chat-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  quitarChips();
});
</script>
</body>
</html>
