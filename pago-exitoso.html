<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pago confirmado — attempo</title>
  <link rel="icon" href="/logo_attempo.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, -apple-system, sans-serif;
      background: #f5f3ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(108,92,228,0.12);
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .logo { margin-bottom: 32px; }
    .logo img { height: 40px; }
    .check-circle {
      width: 72px; height: 72px;
      background: #ecfdf5;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
    }
    .check-circle svg { color: #10b981; }
    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 10px;
    }
    p {
      font-size: 15px;
      color: #6b7280;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .pill {
      display: inline-block;
      background: #ede9fe;
      color: #6C5CE4;
      font-size: 13px;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 999px;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: #6C5CE4;
      color: #fff;
      text-decoration: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      transition: background .15s;
    }
    .btn:hover { background: #5a4bd1; }
    .footer {
      margin-top: 32px;
      font-size: 12px;
      color: #9ca3af;
    }
    .footer a { color: #6C5CE4; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="/logo_attempo.png" alt="attempo">
    </div>

    <div class="check-circle">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>

    <h1>¡Pago confirmado!</h1>
    <p>Tu suscripción a attempo fue activada exitosamente. Ya puedes acceder a todas las funciones de tu plan.</p>

    <div class="pill" id="plan-pill">Plan mensual activo</div>

    <br>
    <a href="/admin" class="btn">Ir al panel de administración</a>

    <div class="footer">
      <p>¿Tienes dudas? Escríbenos a <a href="mailto:contacto@attempo.cl">contacto@attempo.cl</a></p>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const tipo = params.get('tipo');
    const plan = params.get('plan');

    if (tipo === 'cita') {
      document.querySelector('h1').textContent = '¡Pago recibido!';
      document.querySelector('p').textContent = 'Tu cita está confirmada. Recibirás un correo con los detalles de tu reserva.';
      document.getElementById('plan-pill').textContent = 'Cita confirmada ✓';
      const slug = params.get('slug');
      let vueltaHref = 'https://app.attempo.cl';
      if (slug) {
        vueltaHref = `https://app.attempo.cl/${slug}`;
      } else if (document.referrer) {
        try {
          const ref = new URL(document.referrer);
          if (ref.hostname === 'app.attempo.cl' && ref.pathname.length > 1) {
            vueltaHref = document.referrer;
          }
        } catch {}
      }
      document.querySelector('.btn').href = vueltaHref;
      document.querySelector('.btn').textContent = 'Volver al negocio';
    } else if (plan === 'anual') {
      document.getElementById('plan-pill').textContent = 'Plan anual activo';
    }
  </script>
</body>
</html>
