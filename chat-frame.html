<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --a: #6C5CE4; --a2: #8B7CF8; --a3: #4F3EE0;
  --bg: #F0EFFE;
  --t1: #16143A; --t2: #5E5880; --t3: #9C96B4; --t4: #C4C0D8;
  --b1: rgba(108,92,228,0.1); --b2: rgba(108,92,228,0.22);
  --green: #16A34A;
}
html, body {
  height: 100%; width: 100%;
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  overflow: hidden;
}
body { display: flex; flex-direction: column; }

/* ── HEADER ── */
.hd {
  flex-shrink: 0;
  background: linear-gradient(135deg, #1E1B3A 0%, #16143A 60%, #1A1642 100%);
  padding: 14px 16px;
  display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid rgba(108,92,228,0.25);
}
.hd-av {
  width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
  background: linear-gradient(135deg, #8B7CF8, #6C5CE4);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #fff; letter-spacing: -.01em;
  box-shadow: 0 3px 12px rgba(108,92,228,0.55);
  border: 2px solid rgba(255,255,255,0.12);
}
.hd-info { flex: 1; min-width: 0; }
.hd-name {
  font-size: 14px; font-weight: 600; color: #fff;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  letter-spacing: -.02em; margin-bottom: 2px;
}
.hd-status { display: flex; align-items: center; gap: 5px; font-size: 11px; color: rgba(255,255,255,0.5); }
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: blink 2.5s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.35} }

/* ── MENSAJES ── */
.msgs {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding: 20px 16px 12px;
  display: flex; flex-direction: column; gap: 16px;
  scroll-behavior: smooth;
}
.msgs::-webkit-scrollbar { width: 4px; }
.msgs::-webkit-scrollbar-thumb { background: var(--b2); border-radius: 4px; }

.msg { display: flex; gap: 10px; max-width: 88%; }
.msg.ai  { align-self: flex-start; }
.msg.user{ align-self: flex-end; flex-direction: row-reverse; }
.msg { animation: fadeup .22s ease; }
@keyframes fadeup { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

.av {
  width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; margin-top: 2px;
  background: linear-gradient(135deg, #8B7CF8, #4F3EE0);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; color: #fff;
  box-shadow: 0 2px 8px rgba(108,92,228,0.3);
}
.bubble {
  padding: 11px 14px;
  font-size: 14px; line-height: 1.65;
  word-break: break-word;
}
.msg.ai  .bubble {
  background: #fff; color: var(--t1);
  border-radius: 4px 16px 16px 16px;
  box-shadow: 0 2px 10px rgba(108,92,228,0.09);
  border: 1px solid var(--b1);
}
.msg.user .bubble {
  background: linear-gradient(135deg, #6C5CE4, #4F3EE0); color: #fff;
  border-radius: 16px 4px 16px 16px;
  box-shadow: 0 3px 14px rgba(108,92,228,0.38);
}

/* ── CHIPS ── */
.chips {
  display: flex; flex-wrap: wrap; gap: 8px;
  padding-left: 42px; margin-top: 2px;
  animation: fadeup .24s ease;
}
.chip {
  padding: 8px 15px;
  background: #fff;
  border: 1.5px solid var(--b2);
  border-radius: 100px;
  font-size: 12.5px; font-weight: 500; color: var(--a);
  cursor: pointer; white-space: nowrap; user-select: none;
  transition: all .15s;
  box-shadow: 0 1px 5px rgba(108,92,228,0.09);
}
.chip:hover {
  background: rgba(108,92,228,0.06); border-color: var(--a);
  transform: translateY(-1px); box-shadow: 0 4px 12px rgba(108,92,228,0.16);
}
.chip:active { transform: translateY(0); }

/* ── SLOTS ── */
.slots { padding-left: 42px; margin-top: 6px; animation: fadeup .24s ease; }
.slot-lbl {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: .07em; color: var(--t3); margin-bottom: 8px;
}
.slot-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 7px; max-width: 250px; margin-bottom: 12px;
}
.slot-btn {
  padding: 9px 6px;
  background: #fff; border: 1.5px solid var(--b1); border-radius: 10px;
  font-size: 13px; font-weight: 500; color: var(--t2);
  cursor: pointer; text-align: center;
  transition: all .15s; box-shadow: 0 1px 4px rgba(108,92,228,0.07);
}
.slot-btn:hover {
  border-color: var(--a); color: var(--a);
  background: rgba(108,92,228,0.05); transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(108,92,228,0.14);
}

/* ── TYPING ── */
.typing .bubble { padding: 14px 16px; }
.dots { display: flex; gap: 4px; align-items: center; }
.dots span {
  width: 7px; height: 7px; border-radius: 50%; background: var(--t4);
  animation: bounce 1.2s ease-in-out infinite;
}
.dots span:nth-child(2) { animation-delay: .2s; }
.dots span:nth-child(3) { animation-delay: .4s; }
@keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-5px)} }

/* ── CONFIRMACIÓN ── */
.confirm-card {
  background: #fff; border: 1px solid rgba(22,163,74,0.2);
  border-radius: 14px; padding: 16px 18px;
  margin-top: 8px; max-width: 260px; margin-left: 42px;
  box-shadow: 0 3px 14px rgba(22,163,74,0.1);
  animation: fadeup .3s ease;
}
.confirm-ico {
  width: 38px; height: 38px; border-radius: 50%;
  background: rgba(22,163,74,0.1); border: 1.5px solid rgba(22,163,74,0.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; margin-bottom: 10px;
  animation: pop .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes pop { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }
.confirm-title { font-size: 13px; font-weight: 700; color: var(--t1); margin-bottom: 10px; }
.confirm-row { display: flex; gap: 8px; font-size: 12px; margin-bottom: 5px; align-items: baseline; }
.confirm-row b { color: var(--t3); font-weight: 500; min-width: 62px; flex-shrink: 0; }
.confirm-row span { color: var(--t1); font-weight: 600; }

/* ── INPUT ── */
.bar {
  flex-shrink: 0; padding: 12px 14px 16px;
  background: #fff; border-top: 1px solid var(--b1);
  display: flex; gap: 10px; align-items: flex-end;
}
.inp {
  flex: 1; padding: 11px 16px;
  border: 1.5px solid var(--b1); border-radius: 24px;
  font-size: 14px; font-family: 'Inter', system-ui, sans-serif;
  color: var(--t1); background: var(--bg);
  outline: none; resize: none; max-height: 90px; overflow-y: auto;
  transition: border-color .15s, background .15s; line-height: 1.5;
}
.inp:focus { border-color: var(--a); background: #fff; }
.inp::placeholder { color: var(--t4); }
.send {
  width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;
  background: linear-gradient(135deg, #6C5CE4, #4F3EE0); border: none;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 14px rgba(108,92,228,0.42); transition: all .15s;
}
.send:hover { transform: scale(1.1); box-shadow: 0 6px 20px rgba(108,92,228,0.52); }
.send:disabled { opacity: .35; cursor: not-allowed; transform: none; box-shadow: none; }
.send svg { color: #fff; }

/* ── LOADING ── */
.loading {
  flex: 1; display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 12px; color: var(--t3); font-size: 13px;
}
.spin {
  width: 28px; height: 28px;
  border: 2.5px solid rgba(108,92,228,0.15); border-top-color: var(--a);
  border-radius: 50%; animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="hd">
  <div class="hd-av">tt</div>
  <div class="hd-info">
    <div class="hd-name" id="biz-name">Cargando...</div>
    <div class="hd-status"><span class="dot"></span>En línea</div>
  </div>
</div>

<div class="msgs" id="msgs">
  <div class="loading" id="loading">
    <div class="spin"></div>
    <span>Conectando...</span>
  </div>
</div>

<div class="bar">
  <textarea class="inp" id="inp" placeholder="Escribe tu respuesta..." rows="1"></textarea>
  <button class="send" id="send">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
    </svg>
  </button>
</div>

<script>
const SURL = 'https://xztqawulvrtjvtfixofy.supabase.co';
const SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh6dHFhd3VsdnJ0anZ0Zml4b2Z5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MTQ4OTgsImV4cCI6MjA5MjI5MDg5OH0.nMxUfN_pR3FImpO6l9MsYo9Z5B-0KU1ZHfbPor2qgu8';
const SH   = { apikey: SKEY, Authorization: `Bearer ${SKEY}` };

const params  = new URLSearchParams(window.location.search);
let clienteId = params.get('cid') || null;
const slug    = params.get('slug') || null;

let negocioNombre = '';
let historial     = [];
let enviando      = false;

const msgsEl = document.getElementById('msgs');
const inpEl  = document.getElementById('inp');
const sendEl = document.getElementById('send');

const CHIPS_INICIAL = ['Quiero agendar una cita', 'Horarios de atención', 'Ver servicios', 'Otra consulta'];

/* ── INIT ── */
(async function() {
  try {
    let rows;
    if (clienteId) {
      const r = await fetch(`${SURL}/rest/v1/clientes_sistema?id=eq.${clienteId}&select=id,nombre_negocio&limit=1`, { headers: SH });
      rows = await r.json();
    } else if (slug) {
      const r = await fetch(`${SURL}/rest/v1/clientes_sistema?booking_slug=eq.${encodeURIComponent(slug)}&select=id,nombre_negocio&limit=1`, { headers: SH });
      rows = await r.json();
    }
    if (Array.isArray(rows) && rows.length) {
      clienteId     = rows[0].id;
      negocioNombre = rows[0].nombre_negocio || 'la clínica';
    }
  } catch(_) {}

  document.getElementById('biz-name').textContent = negocioNombre || 'Reservas';
  document.getElementById('loading').remove();
  agregarMsg('ai', `¡Hola! Bienvenido/a a ${negocioNombre || 'nuestra clínica'}. Soy Attia, tu asistente virtual. ¿En qué puedo ayudarte?`, null, CHIPS_INICIAL);
})();

/* ── CHIPS CONTEXTUALES ── */
function getChips(t) {
  t = t.toLowerCase();
  if (t.includes('nombre') || t.includes('llamas')) return [];
  if (t.includes('motivo') || t.includes('en qué puedo')) return ['Consulta general', 'Control', 'Primera consulta', 'Urgencia'];
  if (t.includes('qué día') || t.includes('fecha') || t.includes('cuándo')) return ['Hoy', 'Mañana', 'Esta semana'];
  if (t.includes('todo correcto') || t.includes('¿confirm') || t.includes('¿agend')) return ['Sí, confirmar', 'No, cambiar algo'];
  if (t.includes('email') || t.includes('correo')) return ['No tengo email'];
  return [];
}

/* ── ENVIAR ── */
async function enviar(texto) {
  if (enviando) return;
  if (!texto) texto = inpEl.value.trim();
  if (!texto) return;
  inpEl.value = ''; inpEl.style.height = '';
  quitarChips();
  agregarMsg('user', texto);
  historial.push({ role: 'user', content: texto });
  enviando = true; sendEl.disabled = true;
  mostrarTyping();
  const r = await llamarIA();
  quitarTyping();
  enviando = false; sendEl.disabled = false;
  if (r) {
    historial.push({ role: 'assistant', content: r.mensaje });
    if (r.slots_disponibles?.length) {
      agregarMsg('ai', r.mensaje, null, null, r.slots_disponibles);
    } else {
      agregarMsg('ai', r.mensaje, r.cita_creada, r.cita_creada ? [] : getChips(r.mensaje));
    }
  }
}

async function llamarIA() {
  try {
    const r = await fetch('/api/ai-chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: historial, cliente_id: clienteId, negocio_nombre: negocioNombre })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error);
    return d;
  } catch(e) {
    agregarMsg('ai', 'Ups, hubo un problema. ¿Puedes intentar de nuevo?');
    return null;
  }
}

/* ── UI ── */
function agregarMsg(rol, texto, cita, chips, slots) {
  const div = document.createElement('div');
  div.className = `msg ${rol}`;
  if (rol === 'ai') {
    div.innerHTML = `<div class="av">tt</div><div class="bubble">${esc(texto)}</div>`;
  } else {
    div.innerHTML = `<div class="bubble">${esc(texto)}</div>`;
  }
  msgsEl.appendChild(div);

  if (cita)          msgsEl.appendChild(cardConfirmacion(cita));
  if (slots?.length) msgsEl.appendChild(renderSlots(slots));
  else if (chips?.length) {
    const cd = document.createElement('div');
    cd.className = 'chips'; cd.id = 'chips-activos';
    chips.forEach(c => {
      const b = document.createElement('button');
      b.className = 'chip'; b.textContent = c;
      b.addEventListener('click', () => enviar(c));
      cd.appendChild(b);
    });
    msgsEl.appendChild(cd);
  }
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

function renderSlots(slots) {
  const manana = slots.filter(s => parseInt(s) < 13);
  const tarde  = slots.filter(s => parseInt(s) >= 13);
  const wrap = document.createElement('div');
  wrap.className = 'slots'; wrap.id = 'chips-activos';
  function sec(label, lista) {
    if (!lista.length) return;
    const s = document.createElement('div');
    const l = document.createElement('div'); l.className = 'slot-lbl'; l.textContent = label;
    const g = document.createElement('div'); g.className = 'slot-grid';
    lista.forEach(h => {
      const b = document.createElement('button'); b.className = 'slot-btn'; b.textContent = h;
      b.addEventListener('click', () => enviar(h));
      g.appendChild(b);
    });
    s.appendChild(l); s.appendChild(g); wrap.appendChild(s);
  }
  sec('Mañana', manana); sec('Tarde', tarde);
  return wrap;
}

function cardConfirmacion(cita) {
  const fecha = cita.fecha ? new Date(cita.fecha + 'T12:00:00').toLocaleDateString('es-CL', { weekday:'long', day:'numeric', month:'long' }) : '—';
  const hora  = cita.hora ? cita.hora.slice(0,5) : '—';
  const div = document.createElement('div'); div.className = 'confirm-card';
  div.innerHTML = `
    <div class="confirm-ico">✓</div>
    <div class="confirm-title">Cita confirmada</div>
    <div class="confirm-row"><b>Paciente</b><span>${esc(cita.nombre_paciente||'—')}</span></div>
    <div class="confirm-row"><b>Fecha</b><span>${fecha}</span></div>
    <div class="confirm-row"><b>Hora</b><span>${hora}</span></div>
    ${cita.servicio ? `<div class="confirm-row"><b>Motivo</b><span>${esc(cita.servicio)}</span></div>` : ''}`;
  return div;
}

function mostrarTyping() {
  const d = document.createElement('div'); d.className = 'msg ai typing'; d.id = 'typing';
  d.innerHTML = `<div class="av">tt</div><div class="bubble"><div class="dots"><span></span><span></span><span></span></div></div>`;
  msgsEl.appendChild(d); msgsEl.scrollTop = msgsEl.scrollHeight;
}
function quitarTyping() { document.getElementById('typing')?.remove(); }
function quitarChips()  { document.getElementById('chips-activos')?.remove(); }
function esc(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

sendEl.addEventListener('click', () => enviar());
inpEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviar(); }
});
inpEl.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 90) + 'px';
  quitarChips();
});
</script>
</body>
</html>
