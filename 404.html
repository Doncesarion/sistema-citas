<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <script>
    (function() {
      var path = window.location.pathname.replace(/^\//, '').replace(/\/$/, '');
      var adminPaths = ['login','admin','superadmin','reset-password','editor','landing','configuracion','ventas','reportes','agenda','clientes','accesos','gc-callback','privacidad','terminos','gestionar-cita','attempo-booking','attempo-dashboard','chat-frame','booking','reservar'];
      var isAdmin = !path || adminPaths.indexOf(path.split('/')[0]) !== -1;
      if (isAdmin) {
        window.location.replace('/login');
      } else {
        window.location.replace('/attempo-booking?slug=' + encodeURIComponent(path.split('/').pop()));
      }
    })();
  </script>
</head>
<body></body>
</html>
